<ion-header>
  <ion-toolbar color="dark">

    <ion-title>
      Publicaciones Gamer
    </ion-title>

  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <ion-card *ngFor="let encuesta of encuestas">

    <img
      *ngIf="encuesta.imagen"
      [src]="encuesta.imagen">

    <ion-card-header>

      <ion-card-title>
        🎮 {{ encuesta.videojuego }}
      </ion-card-title>

      <ion-card-subtitle>
        👤 {{ encuesta.alias }}
      </ion-card-subtitle>

    </ion-card-header>

    <ion-card-content>

      <p>
        📍 {{ encuesta.lugar }}
      </p>

      <p>
        💬 {{ encuesta.comentario }}
      </p>

      <p>
        🎯 {{ encuesta.genero }}
      </p>

      <p>
        🖥️ {{ encuesta.plataforma }}
      </p>

      <p>
        📅 {{ encuesta.fecha | date:'short' }}
      </p>

      <p>
        🌎 {{ encuesta.latitud }}
      </p>

      <p>
        🌎 {{ encuesta.longitud }}
      </p>

    </ion-card-content>

  </ion-card>

</ion-content>
