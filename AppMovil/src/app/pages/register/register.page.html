<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-title>Crear Cuenta</ion-title>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/login" icon="arrow-back"></ion-back-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding register-content">
  <div class="register-container">
    <div class="header-section">
      <div class="icon-wrapper">
        <ion-icon name="person-add-outline"></ion-icon>
      </div>
      <h1>Registro</h1>
      <p>Únete a la comunidad gamer</p>
    </div>

    <ion-card class="register-card">
      <ion-card-content>
        <ion-item class="modern-item">
          <ion-icon name="mail-outline" slot="start"></ion-icon>
          <ion-input
            label="Correo electrónico"
            labelPlacement="floating"
            type="email"
            [(ngModel)]="email">
          </ion-input>
        </ion-item>

        <ion-item class="modern-item">
          <ion-icon name="lock-closed-outline" slot="start"></ion-icon>
          <ion-input
            label="Contraseña"
            labelPlacement="floating"
            type="password"
            [(ngModel)]="password">
          </ion-input>
        </ion-item>

        <ion-button expand="block" color="primary" class="register-action-btn" (click)="register()">
          <ion-icon name="person-add-outline" slot="start"></ion-icon>
          Crear cuenta
        </ion-button>

        <p class="login-link">
          ¿Ya tienes cuenta?
          <a (click)="goToLogin()">Inicia sesión</a>
        </p>
      </ion-card-content>
    </ion-card>
  </div>
</ion-content>
