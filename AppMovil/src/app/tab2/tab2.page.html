<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-title>Evidencias Subidas</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="gallery-content">
  <div class="gallery-empty" *ngIf="evidencias.length === 0 && !cargando">
    <div class="empty-icon">
      <ion-icon name="images-outline"></ion-icon>
    </div>
    <h3>Sin evidencias aún</h3>
    <p>Las fotos tomadas en las encuestas aparecerán aquí</p>
  </div>

  <ion-grid class="photo-grid" *ngIf="evidencias.length > 0">
    <ion-row>
      <ion-col size="6" *ngFor="let item of evidencias; index as position">
        <div class="photo-card">
          <img [src]="item.imagen" class="photo-img" />
          <div class="photo-overlay">
            <span>{{ item.videojuego || 'Evidencia' }}</span>
          </div>
          <div class="photo-badge">{{ item.alias }}</div>
        </div>
      </ion-col>
    </ion-row>
  </ion-grid>
</ion-content>
